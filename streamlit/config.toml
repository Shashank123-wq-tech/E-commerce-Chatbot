# .streamlit/config.toml
# Streamlit server & UI configuration

[server]
headless       = true          # required for Streamlit Cloud / Docker
enableCORS     = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false       # opt out of Streamlit telemetry

[theme]
base            = "dark"
primaryColor    = "#7C3AED"    # purple accent
backgroundColor = "#0F0F0F"
secondaryBackgroundColor = "#1A1A2E"
textColor       = "#FAFAFA"
font            = "sans serif"